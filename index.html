
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overcomers Temple of God | Welcome Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: '#1A2B48',
              gold: '#C5A059',
              offWhite: '#F9F9F9',
              deepGold: '#A68546',
            },
            fontFamily: {
              header: ['Playfair Display', 'serif'],
              body: ['Montserrat', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: 'Montserrat', sans-serif;
        background-color: #F9F9F9;
        scroll-behavior: smooth;
        margin: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .font-header { font-family: 'Playfair Display', serif; }
      #root { min-height: 100vh; display: flex; flex-direction: column; }
      
      /* Smooth Animations */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .animate-fade-in-up { animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .animate-fade-in { animation: fadeIn 1.2s ease-out forwards; }
      .animate-fade-in-down { animation: fadeInDown 0.5s ease-out forwards; }
      
      .delay-100 { animation-delay: 0.1s; }
      .delay-200 { animation-delay: 0.2s; }
      .delay-300 { animation-delay: 0.3s; }

      /* Scrollbar Styling for a clean look */
      ::-webkit-scrollbar { width: 10px; }
      ::-webkit-scrollbar-track { background: #1A2B48; }
      ::-webkit-scrollbar-thumb { background: #C5A059; border-radius: 5px; }
      ::-webkit-scrollbar-thumb:hover { background: #A68546; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react/": "https://esm.sh/react@^19.2.3/"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
  </body>
</html>
